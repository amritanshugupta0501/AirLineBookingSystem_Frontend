<div class="auth-container animate-fade-in">
  <div class="glass-panel auth-panel">
    <h2>Welcome Back</h2>
    <p class="text-muted mb-4">Sign in to manage your bookings</p>
    
    <div *ngIf="error" class="alert alert-error">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" [(ngModel)]="credentials.username" required>
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required>
      </div>
      
      <button type="submit" class="btn btn-primary w-full mt-4" [disabled]="!loginForm.form.valid || loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    
    <div class="auth-links">
      <p>Don't have an account? <a href="#">Register</a></p>
    </div>
  </div>
</div>
